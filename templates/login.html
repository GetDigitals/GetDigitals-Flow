<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — GetDigitals Flow</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, Segoe UI, Roboto, sans-serif;
    background: #0d0f1a;
    color: #f1f1f1;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 20px;
  }
  .card {
    background: #14172a;
    border: 1px solid #262a44;
    border-radius: 16px;
    padding: 36px 28px;
    width: 100%;
    max-width: 400px;
  }
  h1 {
    font-size: 22px;
    margin: 0 0 6px;
    color: #E8650A;
  }
  p.sub { color: #9a9db8; margin: 0 0 24px; font-size: 14px; }
  label { display: block; font-size: 13px; margin: 16px 0 6px; color: #c7c9de; }
  input {
    width: 100%;
    padding: 12px 14px;
    border-radius: 10px;
    border: 1px solid #2c304e;
    background: #0d0f1a;
    color: #fff;
    font-size: 15px;
  }
  input:focus { outline: none; border-color: #E8650A; }
  button {
    width: 100%;
    margin-top: 24px;
    padding: 13px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(135deg, #E8650A, #ff8a3d);
    color: #fff;
    font-weight: 600;
    font-size: 15px;
    cursor: pointer;
  }
  .flash {
    background: #3a1f1f;
    color: #ff9d9d;
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 13px;
    margin-bottom: 14px;
  }
  .switch { margin-top: 20px; text-align: center; font-size: 13px; color: #9a9db8; }
  .switch a { color: #E8650A; text-decoration: none; font-weight: 600; }
</style>
</head>
<body>
  <div class="card">
    <h1>GetDigitals Flow</h1>
    <p class="sub">Apne account mein login karo.</p>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        {% for m in messages %}<div class="flash">{{ m }}</div>{% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST" action="{{ url_for('login') }}">
      <label>Email</label>
      <input type="email" name="email" required>

      <label>Password</label>
      <input type="password" name="password" required>

      <button type="submit">Login</button>
    </form>

    <div class="switch">Account nahi hai? <a href="{{ url_for('signup') }}">Sign Up karo</a></div>
  </div>
</body>
</html>
